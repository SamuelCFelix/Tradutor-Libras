<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #f5f5f5; font-family: Arial, sans-serif; }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px;
    }

    #texto-fala {
      font-size: 22px;
      color: #222;
      line-height: 1.6;
      text-align: center;
      max-width: 600px;
      cursor: pointer;
      padding: 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    #texto-fala:hover {
      background: #e0e8ff;
    }

    #dica {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      text-align: center;
    }

    #status-vlibras {
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div id="container">
    <p id="texto-fala">Sua fala aparecerá aqui após a gravação...</p>
    <p id="dica">Segure ESPAÇO para gravar · Clique no texto para traduzir para Libras</p>
    <p id="status-vlibras">Carregando VLibras...</p>
  </div>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/spbgovbr-vlibras/vlibras-portal@sgd/app/vlibras-plugin.js"
          onerror="document.getElementById('status-vlibras').textContent='Erro ao carregar VLibras'">
  </script>
  <script>
    var vlibrasWidget = null;

    try {
      vlibrasWidget = new window.VLibras.Widget('https://www.vlibras.gov.br/app/');
    } catch(e) {
      document.getElementById('status-vlibras').textContent = 'Erro: ' + e.message;
    }

    window.addEventListener('load', function() {
      document.getElementById('status-vlibras').textContent = 'VLibras carregado.';
      setTimeout(function() {
        var btn = document.querySelector('[vw-access-button]');
        if (btn) btn.click();
        document.getElementById('status-vlibras').textContent = '';
      }, 1200);
    });

    function mostrarTexto(texto) {
      var el = document.getElementById('texto-fala');
      if (el) el.textContent = texto;
    }

    function traduzir(texto) {
      mostrarTexto(texto);
      // Simula o clique no texto para acionar o VLibras normalmente
      setTimeout(function() {
        var el = document.getElementById('texto-fala');
        if (el) el.click();
      }, 150);
    }
  </script>
</body>
</html>
