<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; font-family: Arial, sans-serif; }

    #status-vlibras {
      color: #8888cc;
      font-size: 13px;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    /* Texto invisível usado apenas para o VLibras detectar e traduzir */
    #texto-fala { position: absolute; opacity: 0; pointer-events: none; font-size: 1px; }
  </style>
</head>
<body>
  <p id="status-vlibras">Carregando VLibras...</p>
  <p id="texto-fala"></p>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/spbgovbr-vlibras/vlibras-portal@sgd/app/vlibras-plugin.js"
          onerror="document.getElementById('status-vlibras').textContent='Erro ao carregar VLibras'">
  </script>
  <script>
    var vlibrasWidget = null;

    try {
      vlibrasWidget = new window.VLibras.Widget('https://www.vlibras.gov.br/app/');
    } catch(e) {
      document.getElementById('status-vlibras').textContent = 'Erro: ' + e.message;
    }

    window.addEventListener('load', function() {
      document.getElementById('status-vlibras').style.display = 'none';
      // Abre o widget automaticamente ao carregar
      setTimeout(function() {
        var btn = document.querySelector('[vw-access-button]');
        if (btn) btn.click();
      }, 1200);
    });

    function mostrarTexto(texto) {
      var el = document.getElementById('texto-fala');
      if (el) el.textContent = texto;
    }

    function traduzir(texto) {
      mostrarTexto(texto);
      setTimeout(function() {
        var el = document.getElementById('texto-fala');
        if (el) el.click();
      }, 150);
    }
  </script>
</body>
</html>
